ekf_filter_node:   # Node name from robot_localization package
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true # Broadcasts the transform between the world_frame and base_link_frame

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom                 # EKF gives odom->base_footprint transform, so world_frame should be set to odom

    # [x, y, z, 
    # roll, pitch, yaw,
    # vx, vy, vz, 
    # vroll, vpitch, vyaw,
    # ax, ay, az] -- defined in robot_localization package documentation

    # 0 is the index of the odom source for robot_localization. If you have multiple odom sources, it goes odom1, odom2, etc. 
    # Wheel Odometer: position and forward velocity
    odom0: /odom
    odom0_config: [true,  true,  false,
                    false, false, false,
                    true, false, false,
                    false, false, false,
                    false, false, false]
    odom0_differential: false
    odom0_relative: false

    # IMU: orientation, angular velocity, and linear acceleration
    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

